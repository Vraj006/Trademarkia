version: '3.8'

services:
  semantic_search:
    build: .
    container_name: trademarkia_semantic_search
    ports:
      - "8000:8000"
    volumes:
      # Mount the models directory so that when the user runs colab_train.py locally,
      # the Docker container automatically sees the vector database and models.
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
